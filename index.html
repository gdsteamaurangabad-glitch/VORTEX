<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | Beast Edition E-Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

    <div class="scroll-progress" id="scroll-progress"></div>

    <header id="main-header">
        <nav class="navbar">
            <div class="logo">VORTEX<span>.</span></div>
            <ul class="nav-links">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#products">Shop</a></li>
                <li><a href="#trending">Trending</a></li>
                <li><a href="#faq">FAQ</a></li>
            </ul>
            <div class="nav-icons">
                <i class="fa-solid fa-magnifying-glass" id="open-search"></i>
                <i class="fa-solid fa-moon" id="theme-toggle"></i>
                <div class="wishlist-icon">
                    <i class="fa-solid fa-heart" id="wishlist-btn"></i>
                    <span class="wishlist-badge">0</span>
                </div>
                <div class="cart-icon">
                    <i class="fa-solid fa-cart-shopping" id="cart-btn"></i>
                    <span class="cart-badge">0</span>
                </div>
            </div>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1 class="reveal">The Future of <span>Premium</span></h1>
            <p class="reveal">Elevate your digital life with VORTEX. Beast-mode performance meets luxury aesthetics.</p>
            <div class="hero-btns reveal">
                <a href="#products" class="btn primary">Explore Drop</a>
                <a href="#trending" class="btn secondary">View Trending</a>
            </div>
        </div>
        <div class="hero-image reveal">
            <div class="circle-bg"></div>
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=1099&q=80" alt="Hero Watch">
        </div>
    </section>

    <section class="trending section" id="trending">
        <div class="section-header reveal">
            <h2>Trending <span>Now</span></h2>
        </div>
        <div class="trending-grid" id="trending-list"></div>
    </section>

    <section class="products section" id="products">
        <div class="section-header reveal">
            <h2>The <span>Main Vault</span></h2>
        </div>
        <div class="product-grid" id="product-list"></div>
    </section>

    <div class="sidebar" id="cart-sidebar">
        <div class="sidebar-header">
            <h3>Shopping Vault</h3>
            <i class="fa-solid fa-xmark close-sidebar" id="close-cart"></i>
        </div>
        <div class="sidebar-items" id="cart-items"></div>
        <div class="sidebar-footer">
            <div class="total-row"><span>Total:</span><span id="cart-total-val">$0.00</span></div>
            <button class="btn primary full-width">Secure Checkout</button>
        </div>
    </div>

    <div class="sidebar" id="wishlist-sidebar">
        <div class="sidebar-header">
            <h3>Wishlist</h3>
            <i class="fa-solid fa-xmark close-sidebar" id="close-wishlist"></i>
        </div>
        <div class="sidebar-items" id="wishlist-items"></div>
    </div>

    <div class="search-modal" id="search-modal">
        <i class="fa-solid fa-xmark close-search" id="close-search"></i>
        <div class="search-content">
            <div class="search-input-group">
                <input type="text" id="search-input" placeholder="Search Beast Gear...">
            </div>
            <div id="search-results"></div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <script src="script.js"></script>
</body>
</html>
